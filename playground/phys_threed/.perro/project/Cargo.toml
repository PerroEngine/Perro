[workspace]

[package]
name = "phys_threed"
version = "0.1.0"
edition = "2024"

[dependencies]
perro_app = "0.1.0"
perro_api = "0.1.0"
perro_scene = "0.1.0"
perro_render_bridge = "0.1.0"
scripts = { path = "../scripts" }

[features]
profile = ["perro_app/profile"]

[profile.release]
opt-level = 3
lto = "fat"
codegen-units = 1
panic = "abort"
strip = "symbols"
incremental = true
debug = false
debug-assertions = false
overflow-checks = false

[patch.crates-io]
perro_ids = { path = "../../../../perro_source/core/perro_ids" }
perro_nodes = { path = "../../../../perro_source/core/perro_nodes" }
perro_particle_math = { path = "../../../../perro_source/core/perro_particle_math" }
perro_structs = { path = "../../../../perro_source/core/perro_structs" }
perro_variant = { path = "../../../../perro_source/core/perro_variant" }
perro_internal_updates = { path = "../../../../perro_source/runtime_project/perro_internal_updates" }
perro_project = { path = "../../../../perro_source/runtime_project/perro_project" }
perro_runtime = { path = "../../../../perro_source/runtime_project/perro_runtime" }
perro_scene = { path = "../../../../perro_source/runtime_project/perro_scene" }
perro_api = { path = "../../../../perro_source/api_modules/perro" }
perro_input = { path = "../../../../perro_source/api_modules/perro_input" }
perro_modules = { path = "../../../../perro_source/api_modules/perro_modules" }
perro_resource_context = { path = "../../../../perro_source/api_modules/perro_resource_context" }
perro_runtime_context = { path = "../../../../perro_source/api_modules/perro_runtime_context" }
perro_app = { path = "../../../../perro_source/render_stack/perro_app" }
perro_graphics = { path = "../../../../perro_source/render_stack/perro_graphics" }
perro_meshlets = { path = "../../../../perro_source/render_stack/perro_meshlets" }
perro_render_bridge = { path = "../../../../perro_source/render_stack/perro_render_bridge" }
perro_scripting = { path = "../../../../perro_source/script_stack/perro_scripting" }
perro_scripting_macros = { path = "../../../../perro_source/script_stack/perro_scripting_macros" }
perro_assets = { path = "../../../../perro_source/io_stack/perro_assets" }
perro_io = { path = "../../../../perro_source/io_stack/perro_io" }
perro_bark = { path = "../../../../perro_source/audio_stack/perro_bark" }
