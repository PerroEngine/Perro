[project]
name = "ThreeDTest"
main_scene = "res://main.scn"
icon = "res://icon.png"

[graphics]
virtual_resolution = "1920x1080"
vsync = false
msaa = true

meshlets = true
dev_meshlets = true
release_meshlets = true
meshlet_debug_view = false
occlusion_culling = "gpu"
particle_sim_default = "gpu"

[runtime]
target_fps = 360
target_fixed_update = 60

[localization]
source = "res://localization.csv"
key = "key"
default_locale = "en"
 