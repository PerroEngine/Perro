[project]
name = "Demo2D"
main_scene = "res://main.scn"
icon = "res://perro.svg"
startup_splash = "res://perro.svg"

[graphics]
aspect_ratio = "16:9"
vsync = false
msaa = true
occlusion_culling = "off"
particle_sim_default = "gpu"

[rendering.ui]
pixel_snapping = true

[runtime]
frame_rate_cap = "uncapped"
target_fixed_update = 60

[physics]
gravity = -9.81
coef = 1.0

[audio]
listener_max_distance = 500.0
propagation_tick_hz = 20
energy_cutoff = 0.02
debug_rays = false

[audio.propagation_2d]
max_bounces = 4
rays_per_tick = 64
max_ray_distance = 500.0
