[package]
name = "perro_physics"
version = "0.1.0"
edition = "2024"

[dependencies]
ahash = "0.8"
gltf = { version = "1.4.1", features = ["import", "utils"] }
rayon = "1.10"
perro_asset_formats.workspace = true
perro_ids.workspace = true
perro_io.workspace = true
perro_nodes.workspace = true
perro_render_bridge.workspace = true
perro_runtime_api.workspace = true
perro_structs.workspace = true

[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
rapier2d = { version = "0.23", features = ["simd-stable", "parallel"] }
rapier3d = { version = "0.23", features = ["simd-stable", "parallel"] }

[target.'cfg(target_arch = "wasm32")'.dependencies]
rapier2d = { version = "0.23", features = ["simd-stable"] }
rapier3d = { version = "0.23", features = ["simd-stable"] }

[dev-dependencies]
criterion = "0.5"

[[bench]]
name = "joint_sync"
harness = false

[[bench]]
name = "rapier_core"
harness = false
