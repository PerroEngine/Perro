[package]
name = "perro_physics"
version = "0.1.0"
edition = "2024"

[dependencies]
ahash = "0.8"
gltf = { version = "1.4.1", features = ["import", "utils"] }
rayon = "1.10"
rapier2d = { version = "0.23", features = ["simd-stable", "parallel"] }
rapier3d = { version = "0.23", features = ["simd-stable", "parallel"] }

perro_asset_formats = { path = "../../core/perro_asset_formats" }
perro_ids = { path = "../../core/perro_ids" }
perro_io = { path = "../../io_stack/perro_io" }
perro_nodes = { path = "../../core/perro_nodes" }
perro_render_bridge = { path = "../../render_stack/perro_render_bridge" }
perro_runtime_context = { path = "../../api_modules/perro_runtime_context" }
perro_structs = { path = "../../core/perro_structs" }
