[package]
name = "perro_runtime"
version = "0.1.0"
edition = "2024"

[dependencies]
gltf = { version = "1.4.1", features = ["import", "utils"] }
ahash = "0.8"
glam = "0.31.0"
image = { version = "0.25", default-features = true, features = ["png"] }
rayon = "1.10"

perro_ids.workspace = true
perro_asset_formats.workspace = true
perro_builtin_meshes.workspace = true
perro_animation.workspace = true
perro_nodes.workspace = true
perro_ui.workspace = true
perro_structs.workspace = true
perro_runtime_api.workspace = true
perro_resource_api.workspace = true
perro_input_api.workspace = true
perro_internal_updates.workspace = true
perro_scripting.workspace = true
perro_io.workspace = true
perro_scene.workspace = true
perro_variant.workspace = true
perro_render_bridge.workspace = true
perro_project.workspace = true
perro_physics.workspace = true
perro_runtime_render.workspace = true
perro_particle_math.workspace = true
perro_pawdio.workspace = true
perro_csv.workspace = true
perro_web.workspace = true
perro_steamworks = { workspace = true, optional = true }

[target.'cfg(any(target_os = "windows", target_os = "linux", target_os = "macos"))'.dependencies]
arboard = "3.6"
libloading = "0.8"
rapier2d = { version = "0.23", features = ["simd-stable", "parallel"] }
rapier3d = { version = "0.23", features = ["simd-stable", "parallel"] }

[target.'cfg(target_os = "android")'.dependencies]
rapier2d = { version = "0.23", features = ["simd-stable", "parallel"] }
rapier3d = { version = "0.23", features = ["simd-stable", "parallel"] }

[target.'cfg(target_arch = "wasm32")'.dependencies]
rapier2d = { version = "0.23", features = ["simd-stable"] }
rapier3d = { version = "0.23", features = ["simd-stable"] }
web-time = "1.1.0"

[dev-dependencies]
criterion = "0.5"

[features]
bench = []
profile = ["perro_pawdio/profile"]
steamworks = ["dep:perro_steamworks", "perro_steamworks/steamworks-runtime"]

[[bench]]
name = "audio_propagation"
harness = false

[[bench]]
name = "unsafe_hotpaths"
harness = false

[[bench]]
name = "scene_loading"
harness = false
required-features = ["bench"]

[[bench]]
name = "runtime_core_hotpaths"
harness = false
required-features = ["bench"]

[[bench]]
name = "node_state_hotpaths"
harness = false
required-features = ["bench"]

[[bench]]
name = "physics_hotpaths"
harness = false
required-features = ["bench"]

[[bench]]
name = "water_physics"
harness = false
required-features = ["bench"]

[[bench]]
name = "query_hotpaths"
harness = false
required-features = ["bench"]

[[bench]]
name = "mesh_query_hotpaths"
harness = false
required-features = ["bench"]

[[bench]]
name = "signal_hotpaths"
harness = false
required-features = ["bench"]

[[bench]]
name = "csv_loading"
harness = false
required-features = ["bench"]
