[package]
name = "perro_runtime"
version = "0.1.0"
edition = "2024"

[dependencies]
gltf = { version = "1.4.1", features = ["import", "utils"] }
ahash = "0.8"
glam = "0.31.0"
libloading = "0.8"
rapier2d = { version = "0.23", features = ["simd-stable", "parallel"] }
rapier3d = { version = "0.23", features = ["simd-stable", "parallel"] }
csv = "1.4"
image = { version = "0.25", default-features = true, features = ["png"] }
rayon = "1.10"
arboard = "3.6"

perro_ids = "0.1.0"
perro_animation = "0.1.0"
perro_nodes = "0.1.0"
perro_ui = { path = "../../core/perro_ui" }
perro_structs = "0.1.0"
perro_runtime_context = "0.1.0"
perro_resource_context = "0.1.0"
perro_input = "0.1.0"
perro_internal_updates = "0.1.0"
perro_scripting = "0.1.0"
perro_io = "0.1.0"
perro_scene = "0.1.0"
perro_variant = "0.1.0"
perro_render_bridge = "0.1.0"
perro_project = "0.1.0"
perro_particle_math = "0.1.0"
perro_bark = "0.1.0"

[features]
profile = ["perro_bark/profile"]
