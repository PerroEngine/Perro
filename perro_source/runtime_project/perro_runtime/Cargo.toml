[package]
name = "perro_runtime"
version = "0.1.0"
edition = "2024"

[dependencies]
gltf = { version = "1.4.1", features = ["import", "utils"] }
ahash = "0.8"
glam = "0.31.0"
libloading = "0.8"
rapier2d = { version = "0.23", features = ["simd-stable", "parallel"] }
rapier3d = { version = "0.23", features = ["simd-stable", "parallel"] }
csv = "1.4"
image = { version = "0.25", default-features = true, features = ["png"] }
rayon = "1.10"
arboard = "3.6"

perro_ids = { path = "../../core/perro_ids" }
perro_asset_formats = { path = "../../core/perro_asset_formats" }
perro_builtin_meshes = { path = "../../core/perro_builtin_meshes" }
perro_animation = { path = "../../core/perro_animation" }
perro_nodes = { path = "../../core/perro_nodes" }
perro_ui = { path = "../../core/perro_ui" }
perro_structs = { path = "../../core/perro_structs" }
perro_runtime_api = { path = "../../api_modules/perro_runtime_api" }
perro_resource_api = { path = "../../api_modules/perro_resource_api" }
perro_input_api = { path = "../../api_modules/perro_input_api" }
perro_internal_updates = { path = "../perro_internal_updates" }
perro_scripting = { path = "../../script_stack/perro_scripting" }
perro_io = { path = "../../io_stack/perro_io" }
perro_scene = { path = "../perro_scene" }
perro_variant = { path = "../../core/perro_variant" }
perro_render_bridge = { path = "../../render_stack/perro_render_bridge" }
perro_project = { path = "../perro_project" }
perro_physics = { path = "../perro_physics" }
perro_runtime_render = { path = "../perro_runtime_render" }
perro_particle_math = { path = "../../core/perro_particle_math" }
perro_pawdio = { path = "../../audio_stack/perro_pawdio" }
perro_steamworks = { path = "../../api_modules/perro_steamworks", default-features = false, optional = true }

[dev-dependencies]
criterion = "0.5"

[features]
bench = []
profile = ["perro_pawdio/profile"]
steamworks = ["dep:perro_steamworks", "perro_steamworks/steamworks-runtime"]

[[bench]]
name = "audio_propagation"
harness = false

[[bench]]
name = "unsafe_hotpaths"
harness = false

[[bench]]
name = "scene_loading"
harness = false
required-features = ["bench"]

[[bench]]
name = "runtime_core_hotpaths"
harness = false
required-features = ["bench"]

[[bench]]
name = "physics_hotpaths"
harness = false
required-features = ["bench"]

[[bench]]
name = "query_hotpaths"
harness = false
required-features = ["bench"]

[[bench]]
name = "mesh_query_hotpaths"
harness = false
required-features = ["bench"]

[[bench]]
name = "signal_hotpaths"
harness = false
required-features = ["bench"]
