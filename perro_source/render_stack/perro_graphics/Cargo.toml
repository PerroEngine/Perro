[package]
name = "perro_graphics"
version = "0.1.0"
edition = "2024"

[dependencies]
bytemuck = { version = "1.24.0", features = ["derive"] }
pollster = "0.4.0"
glam = "0.31.0"
ahash = "0.8.12"
epaint = "0.33.0"

perro_ids = { path = "../../core/perro_ids" }
perro_meshlets = { path = "../perro_meshlets" }
perro_render_bridge = { path = "../perro_render_bridge" }
perro_particle_math = { path = "../../core/perro_particle_math" }
perro_io = { path = "../../io_stack/perro_io" }
perro_structs = { path = "../../core/perro_structs" }
perro_macros = { path = "../perro_macros" }
image = { version = "0.25.8", default-features = true }
gltf = "1.4.1"

[target.'cfg(target_os = "windows")'.dependencies]
wgpu = { version = "29.0.0", default-features = false, features = ["std", "dx12", "vulkan", "wgsl"] }
winit = { version = "0.30.12", default-features = false, features = ["rwh_06"] }

[target.'cfg(target_os = "linux")'.dependencies]
wgpu = { version = "29.0.0", default-features = false, features = ["std", "vulkan", "wgsl"] }
winit = { version = "0.30.12", default-features = false, features = ["rwh_06", "x11", "wayland", "wayland-dlopen"] }

[target.'cfg(target_os = "macos")'.dependencies]
wgpu = { version = "29.0.0", default-features = false, features = ["std", "metal", "wgsl"] }
winit = { version = "0.30.12", default-features = false, features = ["rwh_06"] }

