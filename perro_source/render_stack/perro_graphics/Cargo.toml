[package]
name = "perro_graphics"
version = "0.1.0"
edition = "2024"

[dependencies]
bytemuck = { version = "1.24.0", features = ["derive"] }
pollster = "0.4.0"
glam = "0.31.0"
ahash = "0.8.12"
epaint = "0.33.0"
fontdb = "0.23"
rayon = "1.10"
ab_glyph = "0.2"
rustybuzz = "0.20.1"

perro_ids.workspace = true
perro_asset_formats.workspace = true
perro_builtin_meshes.workspace = true
perro_graphics_assets.workspace = true
perro_meshlets.workspace = true
perro_render_bridge.workspace = true
perro_particle_math.workspace = true
perro_io.workspace = true
perro_structs.workspace = true
perro_macros.workspace = true
image = { version = "0.25.8", default-features = false, features = ["png", "jpeg", "webp", "bmp", "tga", "ico"] }
gltf = "1.4.1"

[target.'cfg(target_os = "windows")'.dependencies]
wgpu = { version = "29.0.0", default-features = false, features = ["std", "dx12", "vulkan", "wgsl"] }
winit = { version = "0.30.12", default-features = false, features = ["rwh_06"] }

[target.'cfg(target_os = "linux")'.dependencies]
wgpu = { version = "29.0.0", default-features = false, features = ["std", "vulkan", "wgsl"] }
winit = { version = "0.30.12", default-features = false, features = ["rwh_06", "x11", "wayland", "wayland-dlopen"] }

[target.'cfg(target_os = "macos")'.dependencies]
wgpu = { version = "29.0.0", default-features = false, features = ["std", "metal", "wgsl"] }
winit = { version = "0.30.12", default-features = false, features = ["rwh_06"] }

[target.'cfg(target_os = "android")'.dependencies]
wgpu = { version = "29.0.0", default-features = false, features = ["std", "vulkan", "wgsl"] }
winit = { version = "0.30.12", default-features = false, features = ["rwh_06", "android-native-activity"] }

[target.'cfg(target_arch = "wasm32")'.dependencies]
wgpu = { version = "29.0.0", default-features = false, features = ["std", "webgpu", "wgsl"] }
winit = { version = "0.30.12", default-features = false, features = ["rwh_06"] }
wasm-bindgen-futures = "0.4.55"
getrandom = { version = "0.3.4", features = ["wasm_js"] }
web-time = "1.1.0"

[dev-dependencies]
criterion = "0.5"
naga = { version = "29.0.0", features = ["wgsl-in"] }

[[bench]]
name = "cpu_prepare"
harness = false

[[bench]]
name = "command_throughput"
harness = false

[[bench]]
name = "resource_loading"
harness = false

[[bench]]
name = "resource_gc"
harness = false

[[bench]]
name = "shader_wgsl"
harness = false

[[bench]]
name = "frame_timing"
harness = false

[[bench]]
name = "gpu_frame"
harness = false

[[bench]]
name = "camera_stream"
harness = false
