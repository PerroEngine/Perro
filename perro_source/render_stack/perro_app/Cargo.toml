[package]
name = "perro_app"
version = "0.1.0"
edition = "2024"
build = "build.rs"

[lints]
workspace = true

[dependencies]
perro_runtime.workspace = true
perro_api.workspace = true
perro_graphics.workspace = true
perro_graphics_assets.workspace = true
perro_render_bridge.workspace = true
perro_structs.workspace = true
perro_ids.workspace = true
perro_asset_formats.workspace = true
perro_scripting.workspace = true
perro_input_api.workspace = true
perro_runtime_api.workspace = true
perro_ui.workspace = true
perro_web.workspace = true
futures-util = "0.3.31"
uuid = "1.18.1"
perro_io.workspace = true
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
memory-stats = "1.2.0"

[target.'cfg(any(target_os = "windows", target_os = "linux", target_os = "macos"))'.dependencies]
ctrlc = "3.4"
hidapi = "2.6.3"
btleplug = "0.11.8"
gilrs = "0.11"
tokio = { version = "1.48.0", features = ["rt", "time"] }

[features]
fps = []
profile = ["perro_runtime/profile", "profile_heavy"]
ui_profile = []
mem_profile = []
profile_heavy = []
steamworks = ["perro_runtime/steamworks"]

[target.'cfg(target_os = "windows")'.dependencies]
winit = { version = "0.30.12", default-features = false, features = ["rwh_06"] }
# matches windows-sys version winit already pulls in transitively; used only for
# timeBeginPeriod/timeEndPeriod (raise OS timer resolution for frame pacing).
windows-sys = { version = "0.52", features = ["Win32_Media"] }

[target.'cfg(target_os = "linux")'.dependencies]
winit = { version = "0.30.12", default-features = false, features = ["rwh_06", "x11", "wayland", "wayland-dlopen"] }

[target.'cfg(target_os = "macos")'.dependencies]
winit = { version = "0.30.12", default-features = false, features = ["rwh_06"] }

[target.'cfg(target_os = "android")'.dependencies]
winit = { version = "0.30.12", default-features = false, features = ["rwh_06", "android-native-activity"] }

[target.'cfg(target_arch = "wasm32")'.dependencies]
winit = { version = "0.30.12", default-features = false, features = ["rwh_06"] }
wasm-bindgen = "0.2.105"
web-sys = { version = "0.3.82", features = ["Document", "Window", "HtmlCanvasElement", "Element"] }
getrandom = { version = "0.3.4", features = ["wasm_js"] }
web-time = "1.1.0"
