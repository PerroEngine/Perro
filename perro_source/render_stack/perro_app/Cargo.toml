[package]
name = "perro_app"
version = "0.1.0"
edition = "2024"
build = "build.rs"

[dependencies]
perro_runtime = { path = "../../runtime_project/perro_runtime" }
perro_graphics = { path = "../perro_graphics" }
perro_render_bridge = { path = "../perro_render_bridge" }
perro_ids = { path = "../../core/perro_ids" }
perro_scripting = { path = "../../script_stack/perro_scripting" }
perro_input = { path = "../../api_modules/perro_input" }
perro_runtime_context = { path = "../../api_modules/perro_runtime_context" }
perro_ui = { path = "../../core/perro_ui" }
image = { version = "0.25.9", default-features = false, features = ["png", "jpeg", "gif", "bmp", "tga", "webp", "ico"] }
hidapi = "2.6.3"
btleplug = "0.11.8"
gilrs = "0.11"
tokio = { version = "1.48.0", features = ["rt", "time"] }
futures-util = "0.3.31"
uuid = "1.18.1"
perro_io = { path = "../../io_stack/perro_io" }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
memory-stats = "1.2.0"

[features]
profile = ["perro_runtime/profile", "profile_heavy"]
ui_profile = []
mem_profile = []
profile_heavy = []
steamworks = ["perro_runtime/steamworks"]

[target.'cfg(target_os = "windows")'.dependencies]
winit = { version = "0.30.12", default-features = false, features = ["rwh_06"] }

[target.'cfg(target_os = "linux")'.dependencies]
winit = { version = "0.30.12", default-features = false, features = ["rwh_06", "x11", "wayland", "wayland-dlopen"] }

[target.'cfg(target_os = "macos")'.dependencies]
winit = { version = "0.30.12", default-features = false, features = ["rwh_06"] }
