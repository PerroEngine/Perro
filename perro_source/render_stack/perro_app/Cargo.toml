[package]
name = "perro_app"
version = "0.1.0"
edition = "2024"

[dependencies]
perro_runtime = "0.1.0"
perro_graphics = "0.1.0"
perro_render_bridge = "0.1.0"
perro_ids = "0.1.0"
perro_scripting = "0.1.0"
perro_input = "0.1.0"
image = { version = "0.25.9", default-features = false, features = ["png", "jpeg", "gif", "bmp", "tga", "webp", "ico"] }
hidapi = "2.6.3"
btleplug = "0.11.8"
gilrs = "0.11"
tokio = { version = "1.48.0", features = ["rt", "time"] }
futures-util = "0.3.31"
uuid = "1.18.1"
perro_io = "0.1.0"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

[features]
profile = ["perro_runtime/profile"]

[target.'cfg(target_os = "windows")'.dependencies]
winit = { version = "0.30.12", default-features = false, features = ["rwh_06"] }

[target.'cfg(target_os = "linux")'.dependencies]
winit = { version = "0.30.12", default-features = false, features = ["rwh_06", "x11", "wayland", "wayland-dlopen"] }

[target.'cfg(target_os = "macos")'.dependencies]
winit = { version = "0.30.12", default-features = false, features = ["rwh_06"] }
