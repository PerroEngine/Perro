[package]
name = "perro_app"
version = "0.1.0"
edition = "2024"

[dependencies]
perro_runtime = "0.1.0"
perro_graphics = "0.1.0"
perro_render_bridge = "0.1.0"
perro_scripting = "0.1.0"
perro_input = "0.1.0"
hidapi = "2.6.3"
btleplug = "0.11.8"
uuid = { version = "1", default-features = false }
tokio = { version = "1", default-features = false, features = ["rt-multi-thread", "sync", "time", "net", "macros"] }
futures = "0.3"
thiserror = "1.0"

[features]
profile = ["perro_runtime/profile"]

[target.'cfg(target_os = "windows")'.dependencies]
winit = { version = "0.30.12", default-features = false, features = ["rwh_06"] }

[target.'cfg(target_os = "linux")'.dependencies]
winit = { version = "0.30.12", default-features = false, features = ["rwh_06", "x11", "wayland", "wayland-dlopen"] }

[target.'cfg(target_os = "macos")'.dependencies]
winit = { version = "0.30.12", default-features = false, features = ["rwh_06"] }
