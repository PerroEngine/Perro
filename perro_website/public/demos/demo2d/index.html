<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Demo2D</title>
<link rel="icon" href="assets/perro.svg">
<link rel="modulepreload" href="app.js">
<link rel="preload" href="app_bg.wasm" as="fetch" type="application/wasm" crossorigin>
<style>
:root{color-scheme:dark}html,body{margin:0;min-height:100%;background:radial-gradient(circle at top,#182233 0%,#0b0d12 55%,#07090d 100%);color:#dce7f9;font-family:Inter,Segoe UI,system-ui,sans-serif}body{display:flex;flex-direction:column}#perro-static-page{width:min(1240px,calc(100vw - 32px));margin:0 auto;padding:18px 0 36px}#perro-static-page *{box-sizing:border-box}#perro-static-page a{color:inherit}#perro-static-page img{max-width:100%;height:auto;display:block}#perro-static-page nav,#perro-static-page header,#perro-static-page section,#perro-static-page footer,#perro-static-page div{width:100%}#perro-static-page .perro-node--UiHLayout{display:flex;gap:18px;align-items:stretch;flex-wrap:wrap}#perro-static-page .perro-node--UiVLayout,#perro-static-page .perro-node--UiScrollContainer{display:grid;gap:18px}#perro-static-page .perro-node--UiPanel,#perro-static-page .perro-node--UiScrollContainer{padding:18px;border:1px solid #334158;border-radius:18px;background:rgba(16,21,30,.92);box-shadow:0 18px 60px rgba(0,0,0,.28)}#perro-static-page nav{display:flex;gap:14px;align-items:center;flex-wrap:wrap;padding:16px 18px;border:1px solid #334158;border-radius:18px;background:rgba(16,21,30,.92);box-shadow:0 18px 60px rgba(0,0,0,.28)}#perro-static-page nav .perro-node--UiButton{background:#1a2230;color:#dce7f9;border-color:#4a5f81;box-shadow:none}#perro-static-page nav .perro-node--UiButton:first-child{background:transparent;border-color:transparent;color:#fff4d4;padding-inline:10px}#perro-static-page footer{padding:18px;border:1px solid #334158;border-radius:18px;background:rgba(16,21,30,.92)}#perro-static-page .perro-node--UiLabel{margin:0;line-height:1.45;color:inherit}#perro-static-page a.perro-node--UiButton,#perro-static-page button.perro-node--UiButton{display:inline-flex;align-items:center;justify-content:center;gap:8px;min-height:46px;padding:12px 18px;border:1px solid #f7d891;border-radius:14px;background:#e4b85b;color:#201406;font-weight:700;text-decoration:none;transition:transform .18s ease,background .18s ease,border-color .18s ease}#perro-static-page a.perro-node--UiButton:hover,#perro-static-page button.perro-node--UiButton:hover{transform:translateY(-1px);background:#f0c96d}#perro-static-page p[data-perro-name*='title'],#perro-static-page p[data-perro-name*='hero']{font-size:clamp(1.8rem,4vw,3.4rem);line-height:1.05;color:#fff7e0;font-weight:800;letter-spacing:-.04em}#perro-static-page p[data-perro-name*='text'],#perro-static-page p[data-perro-name*='copy']{color:#c8d4e8}body[data-perro-app='ready'] #perro-static-page{display:none}canvas{display:block;width:100vw;height:100vh;outline:none}#boot{position:fixed;left:12px;top:12px;max-width:min(480px,calc(100vw - 24px));padding:8px 10px;background:rgba(0,0,0,.78);border:1px solid rgba(255,255,255,.12);border-radius:8px;font-size:13px;line-height:1.4;z-index:10;transition:opacity .2s ease;opacity:0;pointer-events:none}#boot[data-kind='error']{opacity:1;pointer-events:auto;color:#ffb4b4;border-color:rgba(255,120,120,.35)}#boot[data-state='done']{opacity:0;pointer-events:none}@media (max-width: 760px){#perro-static-page{width:calc(100vw - 24px);padding:12px 0 28px}#perro-static-page .perro-node--UiHLayout{gap:12px}#perro-static-page nav{gap:10px;padding:14px}#perro-static-page .perro-node--UiPanel,#perro-static-page .perro-node--UiScrollContainer,#perro-static-page footer{padding:14px}#perro-static-page a.perro-node--UiButton,#perro-static-page button.perro-node--UiButton{width:100%}}
</style>
</head>
<body>
<main id="perro-static-page"><div class="perro-node perro-node--UiNode" data-perro-node="UiNode" data-perro-name="demo_ui_root"></div></main>
<div id="boot">Demo2D boot</div>
<script type="module" src="boot.js"></script>
</body>
</html>
