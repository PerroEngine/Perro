name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  fmt:
    name: Format
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Cargo fmt
        run: cargo fmt --all -- --check

  test:
    name: Test
    needs: fmt
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Cargo test
        run: cargo test --workspace
      - name: Cargo integration tests
        run: cargo test --workspace --tests

  clippy:
    name: Clippy
    needs: test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
