[project]
name = "Perro Editor"
main_scene = "res://proj_manager.scn"
icon = "res://perro-logo.png"
startup_splash = "res://perro-logo.png"

[graphics]
virtual_resolution = "1920x1080"
vsync = false

msaa = true

meshlets = false
dev_meshlets = false
release_meshlets = true
meshlet_debug_view = false

occlusion_culling = "gpu"

particle_sim_default = "gpu"

[runtime]
target_fixed_update = 60

[physics]
gravity = -9.81
coef = 1.0


# [localization]
# default_locale = "en"


[metadata]
description = "Perro is an experimental, open-source game engine written in Rust. Built with a focus on simplicity and performance, without sacrificing either."
company = "Open Source"
version = "0.1.0"
copyright = "Apache License 2.0"